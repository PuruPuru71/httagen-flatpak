id: io.github.puru.HTTAGEN
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: httagen
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: httagen
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/PuruPuru71/httagen
        branch: v3
  - name: httagen-app-config
    buildsystem: simple
    build-commands:
    - install -Dm644 ${FLATPAK_ID}.desktop -t /app/share/applications
    - install -Dm644 ${FLATPAK_ID}.metainfo.xml -t /app/share/metainfo
    - install -Dm644 icon_16.png /app/share/icons/hicolor/16x16/apps/${FLATPAK_ID}.png
    - install -Dm644 icon_32.png /app/share/icons/hicolor/32x32/apps/${FLATPAK_ID}.png
    - install -Dm644 icon_64.png /app/share/icons/hicolor/64x64/apps/${FLATPAK_ID}.png
    - install -Dm644 icon_128.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
    - install -Dm644 icon_256.png /app/share/icons/hicolor/256x256/apps/${FLATPAK_ID}.png
    sources:
      - type: file
        path: io.github.puru.HTTAGEN.desktop
      - type: file
        path: io.github.puru.HTTAGEN.metainfo.xml
      - type: file
        path: icon_16.png
      - type: file
        path: icon_32.png
      - type: file
        path: icon_64.png
      - type: file
        path: icon_128.png
      - type: file
        path: icon_256.png
